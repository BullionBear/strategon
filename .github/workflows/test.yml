# Layer 1 (CICD.md §2): unit tests only. Fast, no external dependencies.
# Integration tests exist behind `//go:build integration` and are deliberately
# not run here — they need Postgres, /proc and process forking (§2.1).
name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      # Without a staged dist/ the //go:embed in internal/webassets fails to
      # compile. Tests don't need the real UI, only a non-empty tree.
      - name: Stage placeholder web assets
        run: touch internal/webassets/dist/.gitkeep
      - run: go vet ./...
      - run: go test ./...
      # Guards the CGO_ENABLED=0 premise the whole pipeline rests on (§1):
      # a cgo dependency would break cross-compilation and the scratch runtime.
      - name: Verify static cross-compilation
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./cmd/controlplane
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build ./cmd/agent

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: web
      - run: pnpm run check
        working-directory: web
      - run: pnpm build
        working-directory: web
