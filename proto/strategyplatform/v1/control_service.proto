syntax = "proto3";

package strategyplatform.v1;

option go_package = "github.com/bullionbear/strategon/gen/strategyplatform/v1;strategyplatformv1";

import "google/protobuf/timestamp.proto";
import "strategyplatform/v1/agent_service.proto";
import "strategyplatform/v1/common.proto";
import "strategyplatform/v1/enrollment.proto";
import "strategyplatform/v1/status.proto";
import "strategyplatform/v1/telemetry.proto";

// This is a different kind of connection from AgentService: low-frequency,
// browser/CLI, must be curl-able. Served over HTTP/JSON via Connect. All write
// paths go through the control plane, which validates, updates spec, increments
// generation, and pushes the new DesiredState over the stream.
message Machine {
  ObjectMeta metadata = 1;
  MachineSpec spec = 2;
  MachineResources last_resources = 3;
  bool reachable = 4;
  int32 agent_version = 5; // capability version (monotonic)
  google.protobuf.Timestamp last_heartbeat = 6;
  // Per-strategy desired+actual merged view. Assembled by the control plane so
  // the frontend never joins spec/status itself.
  repeated StrategyView strategies = 7;
  // buildinfo.Version from the agent — display only; not for compatibility
  string agent_build_version = 8;
  // Latest per-process metrics from Heartbeat (instantaneous snapshot).
  repeated ProcessMetrics last_processes = 9;
}

// StrategyView is a frontend-friendly join of desired (spec) and actual
// (status). converged is computed by the control plane using the same digest
// equality as the agent reconciler.
message StrategyView {
  string strategy = 1;
  // Desired (from spec)
  ArtifactRef desired_artifact = 2;
  ArtifactRef desired_config = 3;
  int64 spec_generation = 4;
  // Actual (from agent-reported status)
  DeployPhase phase = 5;
  ArtifactRef running_artifact = 6;
  ArtifactRef running_config = 7;
  int64 observed_generation = 8;
  repeated Condition conditions = 9;
  int32 pid = 10;
  int32 restart_count = 11;
  string last_error = 12;
  // Convergence judgment (control plane computed; frontend just renders)
  bool converged = 13; // desired == running && phase == HEALTHY (or stopped && STOPPED)
  bool lease_held = 14; // agent may leave unset; UI shows unknown until lease state is reported
  google.protobuf.Timestamp lease_expires_at = 15;
  // Desired cron schedules (from StrategyAssignmentSpec); read-back for UI.
  repeated CronSchedule schedules = 16;
  // Process start time from agent StatusReport; UI computes uptime as now - started_at.
  google.protobuf.Timestamp started_at = 17;
  // Latest process metrics from Heartbeat (instantaneous; trends via GetMachineMetrics).
  double cpu_percent = 18;
  int64 rss_bytes = 19;
  int32 num_fds = 20;
  // Latest Deploy/SetDeployment/Rollback audit timestamp when available.
  google.protobuf.Timestamp deployed_at = 21;
  // Desired run state from StrategyAssignmentSpec.stopped.
  bool stopped = 22;
}

message ListMachinesRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListMachinesResponse {
  repeated Machine machines = 1;
  string next_page_token = 2;
}

message GetMachineRequest {
  string machine_id = 1;
}

message DeployRequest {
  string machine_id = 1;
  string strategy = 2;
  string artifact_version = 3; // version to deploy
  string config_version = 4; // optional; empty = keep current config
}

message DeployResponse {
  int64 generation = 1; // new spec generation, for the frontend to track convergence
}

// SetDeployment sets a full deployment combination (artifact + config + args +
// env). Any change bumps generation — the deployment version, independent of
// artifact versions. Deploy remains the convenience path for version-only rolls
// that preserve args/env.
message SetDeploymentRequest {
  string machine_id = 1;
  string strategy = 2;
  string artifact_version = 3; // required; references a registered binary artifact
  string config_version = 4; // optional; empty = keep current config
  repeated string args = 5; // launch args; may include ${CONFIG}/${RELEASE_DIR}/${BINARY}
  map<string, string> env = 6; // environment variables (full replace)
}

message SetDeploymentResponse {
  int64 generation = 1; // new deployment generation, for convergence tracking
}

message RollbackRequest {
  string machine_id = 1;
  string strategy = 2;
  string target_version = 3; // empty = previous version
}

message RollbackResponse {
  int64 generation = 1;
}

message UndeployRequest {
  string machine_id = 1;
  string strategy = 2;
}

message UndeployResponse {
  int64 generation = 1;
}

// Stop halts the process but keeps the deployment (assignment + WorkDir/logs).
message StopRequest {
  string machine_id = 1;
  string strategy = 2;
}

message StopResponse {
  int64 generation = 1;
}

// Start resumes a previously Stopped deployment in place (same pinned version).
message StartRequest {
  string machine_id = 1;
  string strategy = 2;
}

message StartResponse {
  int64 generation = 1;
}

message SetScheduleRequest {
  string machine_id = 1;
  string strategy = 2;
  repeated CronSchedule schedules = 3; // full overwrite of the strategy's cron
}

message SetScheduleResponse {
  int64 generation = 1;
}

message AuditEntry {
  google.protobuf.Timestamp timestamp = 1;
  string actor = 2;
  string action = 3; // "Deploy" | "SetDeployment" | "Rollback" | "ConfigChange" | "Stop" | "Start" | "Undeploy" | "DownloadFiles" | "CreateToken" | "RevokeToken" | "RegisterArtifact"
  string machine_id = 4;
  string strategy = 5;
  string from_version = 6;
  string to_version = 7;
  // Free-form context (e.g. downloaded paths for DownloadFiles).
  string detail = 8;
}

message BrowseDirRequest {
  string machine_id = 1;
  string strategy = 2;
  string path = 3; // relative to strategy WorkDir; "" or "." = root
}

message BrowseDirResponse {
  repeated DirEntry entries = 1;
  string path = 2; // echoed, normalized
}

message DownloadFilesRequest {
  string machine_id = 1;
  string strategy = 2;
  repeated string paths = 3;
}

message DownloadChunk {
  bytes data = 1;
  string filename = 2; // set on first chunk
  TransferKind transfer_kind = 3; // set on first chunk
  bool eof = 4;
}

message ListAuditRequest {
  string machine_id = 1;
  string strategy = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message ListAuditResponse {
  repeated AuditEntry entries = 1;
  string next_page_token = 2;
}

message MachineStatusEvent {
  string machine_id = 1;
  Machine machine = 2;
  google.protobuf.Timestamp at = 3;
}

// Artifact catalog: Deploy resolves artifact_version against registered
// artifacts (digest + uri). Additive follow-on so the
// human API can replace /admin/assign without requiring digest in every Deploy.
message RegisterArtifactRequest {
  ArtifactRef artifact = 1;
}

message RegisterArtifactResponse {}

message ListArtifactsRequest {
  string name = 1; // optional filter; empty = all
}

message ListArtifactsResponse {
  repeated ArtifactRef artifacts = 1;
}

// Control-plane binary build metadata (display only; not stored).
message GetControlPlaneVersionRequest {}

message ControlPlaneVersion {
  string version = 1; // buildinfo.Version
  string commit_hash = 2;
  string build_time = 3;
}

// One point in the short-term PG sliding window (sparkline source).
message ResourceSamplePoint {
  google.protobuf.Timestamp sampled_at = 1;
  double cpu_percent = 2;
  int64 mem_bytes = 3;
}

message GetMachineMetricsRequest {
  string machine_id = 1;
  // Empty = machine-level samples; non-empty = that strategy's process samples.
  string strategy = 2;
  // Lookback window in seconds; 0 defaults to 3600 (1 hour).
  int64 range_seconds = 3;
}

message GetMachineMetricsResponse {
  repeated ResourceSamplePoint samples = 1;
}

service ControlPlaneService {
  rpc ListMachines(ListMachinesRequest) returns (ListMachinesResponse);
  rpc GetMachine(GetMachineRequest) returns (Machine);

  rpc Deploy(DeployRequest) returns (DeployResponse);
  rpc SetDeployment(SetDeploymentRequest) returns (SetDeploymentResponse);
  rpc Rollback(RollbackRequest) returns (RollbackResponse);
  rpc Stop(StopRequest) returns (StopResponse);
  rpc Start(StartRequest) returns (StartResponse);
  rpc Undeploy(UndeployRequest) returns (UndeployResponse);
  rpc SetSchedule(SetScheduleRequest) returns (SetScheduleResponse);

  // UI real-time panel: machine status and deploy progress push.
  rpc WatchMachine(GetMachineRequest) returns (stream MachineStatusEvent);

  rpc ListAudit(ListAuditRequest) returns (ListAuditResponse);

  rpc RegisterArtifact(RegisterArtifactRequest) returns (RegisterArtifactResponse);
  rpc ListArtifacts(ListArtifactsRequest) returns (ListArtifactsResponse);

  // Ops display: control-plane build version (header/footer).
  rpc GetControlPlaneVersion(GetControlPlaneVersionRequest) returns (ControlPlaneVersion);

  // Short-term resource trend from the PG sliding window (not a TSDB).
  rpc GetMachineMetrics(GetMachineMetricsRequest) returns (GetMachineMetricsResponse);

  // Browse a strategy WorkDir on a connected agent (one directory level).
  rpc BrowseDir(BrowseDirRequest) returns (BrowseDirResponse);

  // Download one or more WorkDir paths. A single regular file streams as-is;
  // multiple paths (or a directory) stream as a tar.gz built on the agent.
  rpc DownloadFiles(DownloadFilesRequest) returns (stream DownloadChunk);
}
