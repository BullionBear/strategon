syntax = "proto3";

package strategyplatform.v1;

option go_package = "github.com/bullionbear/strategon/gen/strategyplatform/v1;strategyplatformv1";

import "google/protobuf/timestamp.proto";
import "strategyplatform/v1/enrollment.proto";
import "strategyplatform/v1/spec.proto";
import "strategyplatform/v1/status.proto";
import "strategyplatform/v1/telemetry.proto";

message LeaseRequest {
  string request_id = 1;
  string strategy = 2;
  string machine_id = 3;
  int32 requested_ttl_seconds = 4;
}

message LeaseRenew {
  string lease_id = 1;
  string strategy = 2;
}

message LeaseResponse {
  string request_id = 1;
  bool granted = 2;
  string lease_id = 3;
  google.protobuf.Timestamp expires_at = 4;
  string deny_reason = 5; // e.g. "held by machine M2 until T"
}

// TriggerRollback is an imperative optimization, not a source of truth; it can
// be equivalently expressed by re-pointing the spec version.
message TriggerRollback {
  string command_id = 1;
  string strategy = 2;
  string target_version = 3; // empty = previous version
}

message DrainNow {
  string command_id = 1;
  string strategy = 2;
  int32 grace_seconds = 3;
}

message Ack {
  string command_id = 1;
}

// Nack is sent when the agent receives a command it does not understand. Never
// silently ignore: silent ignore would make the control plane think a deploy
// succeeded.
message Nack {
  string in_reply_to = 1; // rejected message_id / command_id
  string reason = 2; // e.g. "UnknownCommand" | "UnsupportedInThisAgentVersion"
  int32 agent_version = 3;
}

message Event {
  google.protobuf.Timestamp timestamp = 1;
  EventSeverity severity = 2;
  string strategy = 3;
  string reason = 4; // "DeployStarted" | "AutoRollback" | "CrashLoop" | "LeaseSuicide"
  string message = 5;
  map<string, string> details = 6;
}

enum EventSeverity {
  EVENT_SEVERITY_UNSPECIFIED = 0;
  EVENT_SEVERITY_INFO = 1;
  EVENT_SEVERITY_WARNING = 2;
  EVENT_SEVERITY_ERROR = 3;
}

message StatusReport {
  int64 observed_generation = 1;
  repeated StrategyAssignmentStatus assignments = 2;
  MachineSharedStatus shared = 3;
}

// List a directory under a strategy's WorkDir. path is relative to the
// strategy root; "" or "." means the root itself.
message ListDir {
  string request_id = 1;
  string strategy = 2;
  string path = 3;
}

// Fetch one or more files under a strategy's WorkDir. One path streams the
// file as-is; multiple paths stream a tar.gz the agent builds on the fly.
message FetchFiles {
  string request_id = 1;
  string strategy = 2;
  repeated string paths = 3;
}

message DirEntry {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
  google.protobuf.Timestamp mod_time = 4;
  bool is_symlink = 5;
}

message DirListing {
  string request_id = 1;
  string path = 2; // echoed, normalized
  repeated DirEntry entries = 3;
  string error = 4; // non-empty => request failed
}

enum TransferKind {
  TRANSFER_KIND_UNSPECIFIED = 0;
  TRANSFER_KIND_RAW_FILE = 1;
  TRANSFER_KIND_TARBALL = 2;
}

// Streamed file/tarball body. The agent sends N of these per request:
// seq increments from 0; the final message sets eof=true and carries sha256
// of the whole payload. transfer_kind distinguishes a raw single file from a
// generated archive so the UI names the download correctly.
message FileChunk {
  string request_id = 1;
  string filename = 2; // suggested download name (only on seq 0)
  uint32 seq = 3;
  bytes data = 4;
  bool eof = 5;
  string sha256 = 6; // only on eof
  string error = 7; // non-empty => aborted mid-stream
  TransferKind transfer_kind = 8; // only on seq 0
}

// AgentMessage is the northbound envelope. Field 1 is always message_id; oneof
// payloads start at field 2 and only ever grow.
message AgentMessage {
  string message_id = 1;
  oneof payload {
    Register register = 2;
    Heartbeat heartbeat = 3;
    StatusReport status_report = 4;
    Event event = 5;
    Nack nack = 6;
    LeaseRequest lease_request = 7;
    LeaseRenew lease_renew = 8;
    DirListing dir_listing = 9;
    FileChunk file_chunk = 10;
  }
}

// ControlMessage is the southbound envelope. DesiredState is the main message;
// the imperative payloads are latency optimizations, not truth.
message ControlMessage {
  string message_id = 1;
  oneof payload {
    DesiredState desired_state = 2; // main: full desired-state snapshot
    TriggerRollback trigger_rollback = 3; // latency optimization, not truth
    DrainNow drain_now = 4;
    LeaseResponse lease_response = 5;
    Ack ack = 6;
    ListDir list_dir = 7;
    FetchFiles fetch_files = 8;
  }
}

// ResolveArtifactSourceRequest asks the control plane for a short-lived fetch
// URL for a catalog artifact (name+version). Used when the catalog URI is
// s3:// — the CP checks the caller's desired state and returns a presigned
// HTTPS URL. Machine identity comes from the mTLS client certificate CN.
message ResolveArtifactSourceRequest {
  string name = 1;
  string version = 2;
}

message ResolveArtifactSourceResponse {
  string url = 1; // https presigned URL
  google.protobuf.Timestamp expires_at = 2;
  // Field 3 reserved for future per-fetch headers (HeaderSpec). Do not reuse.
  // See design: Authenticated Artifact Sources §1.1 C-weak / §3.6.
  reserved 3;
  reserved "headers";
}

service AgentService {
  // Bootstrap channel: token for cert. This RPC does not require an mTLS client
  // certificate.
  rpc Enroll(EnrollRequest) returns (EnrollResponse);

  // Main connection: agent-initiated outbound bidi stream, mTLS throughout. All
  // southbound commands are pushed back over this stream; the control plane
  // never initiates an inbound connection to the agent.
  rpc Connect(stream AgentMessage) returns (stream ControlMessage);

  // ResolveArtifactSource exchanges an s3:// catalog URI for a short-lived
  // presigned HTTPS URL. Unary (not on the bidi ControlMessage stream) so the
  // agent can correlate request/response without stream demux. Requires mTLS;
  // the caller must have the artifact in its desired state.
  rpc ResolveArtifactSource(ResolveArtifactSourceRequest)
      returns (ResolveArtifactSourceResponse);
}

// LeaseService is the fencing-lease authority.
// Strategy SDKs call these unary RPCs on the agent port (mTLS/h2c); the agent
// bidi stream does not participate in lease acquire/renew.
service LeaseService {
  rpc Acquire(LeaseRequest) returns (LeaseResponse);
  rpc Renew(LeaseRenew) returns (LeaseResponse);
}
