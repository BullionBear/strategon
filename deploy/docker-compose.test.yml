# Local test stack: SeaweedFS (S3) + control plane + two agents (mTLS).
#
# No Discord auth, in-memory CP store. Not for production —
# see docker-compose.yml for the real deploy.
#
# mTLS is required so ResolveArtifactSource can authenticate agents by
# client-cert CN (same as production). Certs are minted at startup by
# controlplane-init / agent-init into the shared `mtls` volume.
#
# Usage (Podman or Docker, from repo root):
#   export DOCKER_HOST=unix:///run/user/$UID/podman/podman.sock   # podman only
#   podman compose -f deploy/docker-compose.test.yml up --build -d
#
# UI / human API:  http://127.0.0.1:8081
# AgentService:    https://127.0.0.1:8080  (mTLS)
# SeaweedFS S3:    http://127.0.0.1:8333  (accessKey/secret: strategon / strategonsecret)
#
# Volumes:
#   agent-m{1,2}-data → /opt/strategies  (releases + shared/ per machine)
#   ./fixtures        → /fixtures:ro     (same on both agents for file://)

name: strategon-test

services:
  seaweedfs:
    image: chrislusf/seaweedfs:3.80
    command:
      - server
      - -dir=/data
      - -s3
      - -s3.port=8333
      - -s3.config=/etc/seaweedfs/s3.json
      - -ip.bind=0.0.0.0
      - -master.volumeSizeLimitMB=100
      - -volume.max=0
    ports:
      - "8333:8333"
    volumes:
      - seaweedfs-data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro

  # Create the artifacts bucket once SeaweedFS accepts S3.
  s3-init:
    image: amazon/aws-cli:2.17.56
    depends_on:
      - seaweedfs
    environment:
      AWS_ACCESS_KEY_ID: strategon
      AWS_SECRET_ACCESS_KEY: strategonsecret
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for i in $$(seq 1 60); do
          if aws --endpoint-url=http://seaweedfs:8333 s3 mb s3://artifacts 2>/dev/null \
             || aws --endpoint-url=http://seaweedfs:8333 s3 ls s3://artifacts >/dev/null 2>&1; then
            echo "bucket artifacts ready"
            exit 0
          fi
          sleep 1
        done
        echo "timed out creating bucket" >&2
        exit 1
    restart: "no"

  # Mint CA + control-plane server cert into the shared mtls volume.
  controlplane-init:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ca
    volumes:
      - mtls:/mtls
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ ! -f /mtls/controlplane/cert.pem ]; then
          strategon-ca init --out /mtls/ca
          strategon-ca sign --ca /mtls/ca --cn controlplane --server \
            --dns controlplane,localhost --ip 127.0.0.1 \
            --out /mtls/controlplane
          cp /mtls/ca/ca-cert.pem /mtls/controlplane/ca-cert.pem
          echo "controlplane TLS material written"
        else
          echo "controlplane TLS material already present"
        fi
    restart: "no"

  # Mint agent client certs (CN = machine id) from the same CA.
  agent-init:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ca
    depends_on:
      controlplane-init:
        condition: service_completed_successfully
    volumes:
      - mtls:/mtls
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for id in m1 m2; do
          if [ ! -f /mtls/$$id/cert.pem ]; then
            strategon-ca sign --ca /mtls/ca --cn $$id --out /mtls/$$id
            cp /mtls/ca/ca-cert.pem /mtls/$$id/ca-cert.pem
            echo "agent $$id TLS material written"
          else
            echo "agent $$id TLS material already present"
          fi
        done
    restart: "no"

  controlplane:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      s3-init:
        condition: service_completed_successfully
      controlplane-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      STRATEGON_S3_ACCESS_KEY: strategon
      STRATEGON_S3_SECRET_KEY: strategonsecret
    volumes:
      - mtls:/mtls:ro
    command:
      - --agent-addr=0.0.0.0:8080
      - --human-addr=0.0.0.0:8081
      - --auth-mode=none
      - --tls-cert=/mtls/controlplane/cert.pem
      - --tls-key=/mtls/controlplane/key.pem
      - --client-ca=/mtls/controlplane/ca-cert.pem
      - --s3-endpoint=http://seaweedfs:8333
      - --s3-bucket=artifacts
      - --s3-region=us-east-1
      # Ingest every http(s) register so S3 path is easy to exercise locally.
      - --ingest-mode=always

  agent-m1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    depends_on:
      controlplane:
        condition: service_started
      agent-init:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - agent-m1-data:/opt/strategies
      - ./fixtures:/fixtures:ro
      - mtls:/mtls:ro
    command:
      - --control-plane=https://controlplane:8080
      - --machine-id=m1
      - --base=/opt/strategies
      - --tls-cert=/mtls/m1/cert.pem
      - --tls-key=/mtls/m1/key.pem
      - --server-ca=/mtls/m1/ca-cert.pem

  agent-m2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    depends_on:
      controlplane:
        condition: service_started
      agent-init:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
      - agent-m2-data:/opt/strategies
      - ./fixtures:/fixtures:ro
      - mtls:/mtls:ro
    command:
      - --control-plane=https://controlplane:8080
      - --machine-id=m2
      - --base=/opt/strategies
      - --tls-cert=/mtls/m2/cert.pem
      - --tls-key=/mtls/m2/key.pem
      - --server-ca=/mtls/m2/ca-cert.pem

volumes:
  seaweedfs-data:
  mtls:
  agent-m1-data:
  agent-m2-data:
