version: v2
managed:
  enabled: false
plugins:
  - local: protoc-gen-go
    out: gen
    opt:
      - paths=source_relative
  - local: protoc-gen-connect-go
    out: gen
    opt:
      - paths=source_relative
  # Connect-ES v2: service descriptors live in the generated *_pb.ts files.
  - local: web/node_modules/.bin/protoc-gen-es
    out: web/src/lib/gen
    opt:
      - target=ts
      - import_extension=js
  # Human ControlPlaneService OpenAPI for the standalone /reference page.
  # AgentService/LeaseService are omitted (agent port, not the human UI).
  - local: protoc-gen-connect-openapi
    out: web/static
    opt:
      - path=openapi.json
      - format=json
      - features=connectrpc
      - services=strategyplatform.v1.ControlPlaneService
      - trim-unused-types
      - short-service-tags
      - base=proto/openapi.base.yaml
